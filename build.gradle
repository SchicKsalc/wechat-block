plugins {
    id 'com.android.application'
}

android {
    namespace 'com.github.wechatblockhot'
    compileSdk 34

    defaultConfig {
        applicationId "com.github.wechatblockhot"
        minSdk 27          // Android 8.1+，覆盖主流设备
        targetSdk 34
        versionCode 3
        versionName "1.3.0"
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources false   // 不缩减资源，避免 xposed_init 被移除
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    // 打包时保留 assets 目录下的 xposed_init
    aaptOptions {
        ignoreAssetsPattern '!.svn:!.git:!.ds_store'
    }
}

dependencies {
    // XposedBridge API（仅编译期依赖，运行时由 LSPosed 提供）
    compileOnly 'de.robv.android.xposed:api:82'
    compileOnly 'de.robv.android.xposed:api:82:sources'
}
